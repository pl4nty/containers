<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: sans-serif; width: 280px; padding: 12px; margin: 0; }
    h2 { font-size: 14px; margin: 0 0 8px; }
    #status { font-size: 12px; color: #666; margin-bottom: 12px; }
    #status.connected { color: #2a7; }
    button { font-size: 12px; padding: 6px 12px; cursor: pointer; }
    #log { font-size: 11px; font-family: monospace; margin-top: 10px;
           max-height: 120px; overflow-y: auto; border: 1px solid #ddd;
           padding: 4px; background: #f9f9f9; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Opera Flow Bridge</h2>
  <div id="status">Checking status...</div>
  <button id="pairBtn">Pair via QR code</button>
  <div id="log"></div>
  <script src="popup.js"></script>
</body>
</html>
